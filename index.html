<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tracker - Consulting Hours</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 32px;
      color: #333;
      margin-bottom: 8px;
    }

    .header p {
      color: #999;
      font-size: 14px;
    }

    .date-display {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 100%;
      text-align: center;
    }

    .status.active {
      background: #10b981;
      color: white;
    }

    .status.inactive {
      background: #f0f0f0;
      color: #666;
    }

    .timer-display {
      text-align: center;
      margin: 40px 0;
      background: #f9f9f9;
      padding: 40px;
      border-radius: 12px;
      border: 2px solid #f0f0f0;
    }

    .timer-text {
      font-size: 56px;
      font-weight: 700;
      color: #333;
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .timer-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin: 30px 0;
    }

    button {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .btn-export {
      width: 100%;
      background: #10b981;
      color: white;
      margin-bottom: 20px;
    }

    .btn-export:hover {
      background: #059669;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 30px 0;
    }

    .stat-card {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #f0f0f0;
    }

    .stat-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #333;
    }

    .entries-section {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #f0f0f0;
    }

    .entries-section h3 {
      font-size: 13px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }

    .entry:last-child {
      border-bottom: none;
    }

    .entry-time {
      color: #666;
      flex: 1;
    }

    .entry-duration {
      font-weight: 600;
      color: #333;
      min-width: 80px;
      text-align: right;
    }

    .entry-delete {
      cursor: pointer;
      color: #ef4444;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      margin-left: 12px;
      transition: all 0.2s;
      font-size: 12px;
    }

    .entry-delete:hover {
      background: #fee2e2;
    }

    .no-entries {
      text-align: center;
      color: #999;
      font-size: 13px;
      padding: 20px 0;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px;
      }

      .header h1 {
        font-size: 24px;
      }

      .timer-text {
        font-size: 40px;
      }

      button {
        padding: 12px 16px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⏱️ Time Tracker</h1>
      <p>Track your consulting hours</p>
    </div>

    <div class="date-display" id="dateDisplay"></div>
    <div class="status inactive" id="statusDisplay">Not clocked in</div>

    <div class="timer-display">
      <div class="timer-text" id="timerDisplay">00:00:00</div>
      <div class="timer-label" id="timerLabel">Ready to start</div>
    </div>

    <div class="button-group">
      <button class="btn-primary" id="punchInBtn" onclick="punchIn()">Punch In</button>
      <button class="btn-danger hidden" id="punchOutBtn" onclick="punchOut()">Punch Out</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Today's Total</div>
        <div class="stat-value" id="todayTotal">0h 0m</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Logged</div>
        <div class="stat-value" id="grandTotal">0h 0m</div>
      </div>
    </div>

    <button class="btn-export" onclick="exportToExcel()">📊 Export to Excel</button>

    <div class="entries-section">
      <h3>Today's Entries</h3>
      <div id="entriesList" class="no-entries">No entries yet. Punch in to start tracking.</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
  <script>
    let punchInTime = null;
    let sessions = [];
    let allSessions = JSON.parse(localStorage.getItem('timeSessions')) || [];
    let timerInterval = null;

    function getToday() {
      const today = new Date();
      return today.toISOString().split('T')[0];
    }

    function formatTime(date) {
      return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    }

    function formatDuration(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function formatDurationReadable(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      if (hours > 0) {
        return `${hours}h ${minutes}m`;
      }
      return `${minutes}m`;
    }

    function punchIn() {
      punchInTime = new Date();
      document.getElementById('punchInBtn').classList.add('hidden');
      document.getElementById('punchOutBtn').classList.remove('hidden');
      document.getElementById('statusDisplay').textContent = 'Clocked In';
      document.getElementById('statusDisplay').classList.remove('inactive');
      document.getElementById('statusDisplay').classList.add('active');
      document.getElementById('timerLabel').textContent = 'Time elapsed';
      startTimer();
    }

    function punchOut() {
      if (!punchInTime) return;

      const punchOutTime = new Date();
      const duration = punchOutTime - punchInTime;

      const session = {
        date: getToday(),
        punchIn: punchInTime.toISOString(),
        punchOut: punchOutTime.toISOString(),
        duration: duration,
        punchInDisplay: formatTime(punchInTime),
        punchOutDisplay: formatTime(punchOutTime)
      };

      allSessions.push(session);
      sessions.push(session);
      localStorage.setItem('timeSessions', JSON.stringify(allSessions));

      punchInTime = null;
      document.getElementById('punchInBtn').classList.remove('hidden');
      document.getElementById('punchOutBtn').classList.add('hidden');
      document.getElementById('statusDisplay').textContent = 'Not clocked in';
      document.getElementById('statusDisplay').classList.add('inactive');
      document.getElementById('statusDisplay').classList.remove('active');
      document.getElementById('timerDisplay').textContent = '00:00:00';
      document.getElementById('timerLabel').textContent = 'Ready to start';

      clearInterval(timerInterval);
      updateDisplay();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        if (punchInTime) {
          const elapsed = new Date() - punchInTime;
          document.getElementById('timerDisplay').textContent = formatDuration(elapsed);
        }
      }, 1000);
    }

    function updateDisplay() {
      const today = getToday();
      const todaySessions = allSessions.filter(s => s.date === today);
      sessions = todaySessions;

      const todayTotal = todaySessions.reduce((sum, s) => sum + s.duration, 0);
      const grandTotal = allSessions.reduce((sum, s) => sum + s.duration, 0);

      document.getElementById('todayTotal').textContent = formatDurationReadable(todayTotal);
      document.getElementById('grandTotal').textContent = formatDurationReadable(grandTotal);

      const entriesList = document.getElementById('entriesList');
      if (todaySessions.length === 0) {
        entriesList.innerHTML = '<div class="no-entries">No entries yet. Punch in to start tracking.</div>';
      } else {
        entriesList.innerHTML = todaySessions.map((s, idx) => `
          <div class="entry">
            <div class="entry-time">${s.punchInDisplay} – ${s.punchOutDisplay}</div>
            <div class="entry-duration">${formatDurationReadable(s.duration)}</div>
            <span class="entry-delete" onclick="deleteEntry(${allSessions.indexOf(s)})">Delete</span>
          </div>
        `).join('');
      }
    }

    function deleteEntry(index) {
      if (confirm('Delete this entry?')) {
        allSessions.splice(index, 1);
        localStorage.setItem('timeSessions', JSON.stringify(allSessions));
        updateDisplay();
      }
    }

    function exportToExcel() {
      if (allSessions.length === 0) {
        alert('No data to export. Start tracking time first!');
        return;
      }

      const data = allSessions.map(s => ({
        'Date': s.date,
        'Punch In': s.punchInDisplay,
        'Punch Out': s.punchOutDisplay,
        'Duration (HH:MM:SS)': formatDuration(s.duration),
        'Duration (Hours)': (s.duration / (1000 * 60 * 60)).toFixed(2)
      }));

      const ws = XLSX.utils.json_to_sheet(data);
      ws['!cols'] = [{ wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 18 }, { wch: 15 }];

      const summaryData = [];
      const dateGroups = {};
      allSessions.forEach(s => {
        if (!dateGroups[s.date]) dateGroups[s.date] = 0;
        dateGroups[s.date] += s.duration;
      });

      Object.entries(dateGroups).forEach(([date, duration]) => {
        summaryData.push({ 'Date': date, 'Total Hours': (duration / (1000 * 60 * 60)).toFixed(2) });
      });

      const totalMs = allSessions.reduce((sum, s) => sum + s.duration, 0);
      summaryData.push({ 'Date': 'GRAND TOTAL', 'Total Hours': (totalMs / (1000 * 60 * 60)).toFixed(2) });

      const ws2 = XLSX.utils.json_to_sheet(summaryData);
      ws2['!cols'] = [{ wch: 12 }, { wch: 15 }];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Detailed Log');
      XLSX.utils.book_append_sheet(wb, ws2, 'Summary');

      XLSX.writeFile(wb, `TimeTracking_${getToday()}.xlsx`);
    }

    document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    updateDisplay();
  </script>
</body>
</html>
